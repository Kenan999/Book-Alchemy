<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Book - Book Alchemy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1><a href="/">📚 Book Alchemy</a></h1>
      <nav class="nav-links">
        <a href="/" class="btn btn-outline">&larr; Back to Library</a>
      </nav>
    </header>

    {% if message %}
    <div class="success-msg">{{ message }}</div>
    {% endif %}

    <div class="form-card">
      <h2 style="margin-bottom: 1.5rem;">Add a New Book</h2>

      <form action="/add_book" method="POST">
        <div class="form-group">
          <label for="title">Title:</label>
          <input type="text" id="title" name="title" required placeholder="e.g. 1984">
        </div>

        <div class="form-group">
          <label for="isbn">ISBN:</label>
          <input type="text" id="isbn" name="isbn" required placeholder="e.g. 9780451524935">
        </div>

        <div class="form-group">
          <label for="publication_year">Publication Year:</label>
          <input type="number" id="publication_year" name="publication_year" placeholder="e.g. 1949">
        </div>

        <div class="form-group">
          <label for="rating">Rating (1-10):</label>
          <input type="number" id="rating" name="rating" min="1" max="10" placeholder="e.g. 9">
        </div>

        <div class="form-group">
          <label for="author_id">Author:</label>
          <select id="author_id" name="author_id" required>
            <option value="" disabled selected>Select an author</option>
            {% for author in authors %}
            <option value="{{ author.id }}">{{ author.name }}</option>
            {% endfor %}
          </select>
          <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">
            Author not listed? <a href="/add_author">Add them first</a>.
          </p>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Add Book</button>
      </form>
    </div>
  </div>
</body>

</html>
