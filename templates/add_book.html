<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Transmute Book | Book Alchemy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="container">
    <header class="header glass fade-up">
      <a href="/" class="logo-link">
        <span style="font-size: 2rem;">🧪</span>
        <h1 style="margin: 0;">Book Alchemy</h1>
      </a>
      <nav>
        <a href="/" class="btn btn-outline">
          <i data-lucide="arrow-left" style="width: 18px;"></i> Library
        </a>
      </nav>
    </header>

    {% if message %}
    <div class="toast">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="sparkles"></i>
            {{ message }}
        </div>
    </div>
    {% endif %}

    <main class="form-wrapper glass fade-up" style="animation-delay: 0.2s;">
      <h2 class="form-title">Bind New Volume</h2>
      <form action="/add_book" method="POST">
        <div class="form-control">
          <label class="form-label" for="title">Volume Title</label>
          <input type="text" id="title" name="title" class="form-input" placeholder="e.g. The Necronomicon" required>
        </div>

        <div class="form-control">
          <label class="form-label" for="isbn">ISBN (The Arcane Key)</label>
          <input type="text" id="isbn" name="isbn" class="form-input" placeholder="10 or 13 digits">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-control">
              <label class="form-label" for="publication_year">Year of Manifestation</label>
              <input type="number" id="publication_year" name="publication_year" class="form-input" placeholder="Year">
            </div>
    
            <div class="form-control">
              <label class="form-label" for="rating">Alchemy Rating (0-10)</label>
              <input type="number" id="rating" name="rating" min="0" max="10" class="form-input" placeholder="Score">
            </div>
        </div>

        <div class="form-control">
          <label class="form-label" for="author_id">Select Author</label>
          <select name="author_id" id="author_id" class="form-input" style="appearance: none;" required>
            <option value="" disabled selected>Who summoned this?</option>
            {% for author in authors %}
            <option value="{{ author.id }}">{{ author.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div style="margin-top: 2.5rem;">
          <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem; font-size: 1.1rem;">
            Seal Binding
          </button>
        </div>
      </form>
    </main>
  </div>

  <script>
    lucide.createIcons();
    // Auto-hide toast
    const toast = document.querySelector('.toast');
    if (toast) {
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'all 0.5s ease';
        setTimeout(() => toast.remove(), 500);
      }, 4000);
    }
  </script>
</body>

</html>
