<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Author - Book Alchemy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1><a href="/">📚 Book Alchemy</a></h1>
      <nav class="nav-links">
        <a href="/" class="btn btn-outline">&larr; Back to Library</a>
      </nav>
    </header>

    {% if message %}
    <div class="success-msg">{{ message }}</div>
    {% endif %}

    <div class="form-card">
      <h2 style="margin-bottom: 1.5rem;">Add a New Author</h2>

      <form action="/add_author" method="POST">
        <div class="form-group">
          <label for="name">Author Name:</label>
          <input type="text" id="name" name="name" required placeholder="e.g. George Orwell">
        </div>

        <div class="form-group">
          <label for="birthdate">Birthdate:</label>
          <input type="date" id="birthdate" name="birthdate" required>
        </div>

        <div class="form-group">
          <label for="date_of_death">Date of Death (Optional):</label>
          <input type="date" id="date_of_death" name="date_of_death">
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Add Author</button>
      </form>
    </div>
  </div>
</body>

</html>
